<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Website</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #f4f7fb;
        color: #1f2937;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }

      header {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
        padding: 3rem 1.5rem;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .card {
        background: white;
        padding: 1.25rem;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Welcome to My responsive website</h1>
        <p>This page is designed to adapt smoothly to smaller screens and tablets.</p>
      </header>

      <section class="grid">
        <div class="card">
          <h2>Responsive Layout</h2>
          <p>The content stacks neatly on smaller screens for easier reading.</p>
        </div>
        <div class="card">
          <h2>Modern Design</h2>
          <p>Clean spacing, clear typography, and simple styling make the page easy to use.</p>
        </div>
      </section>
    </div>
  </body>
</html>
